services:
  - type: web
    name: mailtrack-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HOST
        value: 0.0.0.0
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mailtrack-redis
          property: connectionString
      # Secrets — set in the Render dashboard, never committed:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: API_URL
        sync: false
      - key: WEB_URL
        sync: false

  - type: keyvalue
    name: mailtrack-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
